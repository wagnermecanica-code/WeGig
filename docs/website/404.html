<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Abrindo no WeGig...</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f7fb;
        --text: #17151f;
        --muted: #5d596b;
        --primary: #683fff;
        --border: #dedbea;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        width: min(100% - 32px, 420px);
        padding: 28px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 18px 45px rgba(28, 24, 45, 0.08);
      }

      img {
        width: 84px;
        height: auto;
        display: block;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 24px;
        line-height: 1.2;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 22px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.5;
      }

      a.button {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 12px 16px;
        border-radius: 8px;
        background: var(--primary);
        color: #fff;
        font-weight: 700;
        text-decoration: none;
      }

      a.secondary {
        display: block;
        margin-top: 14px;
        color: var(--muted);
        font-size: 14px;
        text-align: center;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/Logo.png?v=10" alt="WeGig" />
      <h1>Abrindo no WeGig</h1>
      <p id="message">
        Se o app estiver instalado, este link abre direto no conteúdo
        compartilhado.
      </p>
      <a id="open-app" class="button" href="/">Abrir no app</a>
      <a class="secondary" href="/">Ir para wegig.com.br</a>
    </main>

    <script>
      (function () {
        var path = window.location.pathname || "/";
        var supported = /^\/(profile|post|conversation|chat|chat-new)\//.test(
          path,
        );
        var button = document.getElementById("open-app");
        var message = document.getElementById("message");

        if (!supported) {
          button.href = "/";
          button.textContent = "Ir para wegig.com.br";
          message.textContent =
            "Este endereço não existe ou não está mais disponível.";
          return;
        }

        var appUrl =
          "wegig://app" + path + window.location.search + window.location.hash;
        button.href = appUrl;

        window.setTimeout(function () {
          window.location.href = appUrl;
        }, 250);
      })();
    </script>
  </body>
</html>
